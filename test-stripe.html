<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stripe Checkout Test (Vercel)</title>
<style>
body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
input, button { display: block; width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 16px; font-family: inherit; box-sizing: border-box; }
input { border: 1px solid #ccc; }
button { background: #635bff; color: #fff; border: none; cursor: pointer; }
button:disabled { background: #999; cursor: not-allowed; }
#log { background: #f5f5f5; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; white-space: pre-wrap; margin-top: 20px; max-height: 300px; overflow-y: auto; }
.error { color: #c00; }
.success { color: #0a0; }
.info { color: #666; }
</style>
</head>
<body>
<h1>🧪 Тест Vercel → Stripe</h1>

<p>API URL (відносний — працює на Vercel):</p>
<input id="workerUrl" value="/api/checkout" placeholder="/api/checkout" readonly>

<p>Stripe Price ID:</p>
<input id="priceId" value="price_1TnfOYRyrez9SEApRVf7hJWj" placeholder="price_...">

<button id="btn" onclick="go()">💳 Сплатити</button>

<div id="log"></div>

<script>
const log = document.getElementById('log');

function L(msg, cls) {
  log.innerHTML += `<div class="${cls||''}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
  log.scrollTop = log.scrollHeight;
}

async function go() {
  const worker = document.getElementById('workerUrl').value.trim();
  const priceId = document.getElementById('priceId').value.trim();
  const btn = document.getElementById('btn');
  
  if (!priceId) {
    L('❌ Введи Stripe Price ID', 'error');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '⏳ Запит...';
  L(`POST ${worker}`, 'info');
  L(`Товар: ${priceId} × 1`, 'info');
  
  try {
    const res = await fetch(worker, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lineItems: [{ price: priceId, quantity: 1 }],
      }),
    });
    
    const data = await res.json();
    
    if (res.ok && data.url) {
      L(`✅ OK — перенаправляю на Stripe...`, 'success');
      window.location.href = data.url;
    } else {
      L(`❌ HTTP ${res.status}: ${JSON.stringify(data)}`, 'error');
      btn.disabled = false;
      btn.textContent = '💳 Сплатити';
    }
  } catch (err) {
    L(`❌ ${err.message}`, 'error');
    btn.disabled = false;
    btn.textContent = '💳 Сплатити';
  }
}
</script>
</body>
</html>
